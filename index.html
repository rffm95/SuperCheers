<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHEERS EDITION - Heineken Mario</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, sans-serif; 
      background: linear-gradient(135deg, #1a1a1a 0%, #333 50%, #555 100%);
      color: #ffd700; 
      min-height: 100vh; 
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    canvas { 
      border: 4px solid #ffd700; 
      border-radius: 12px; 
      box-shadow: 0 20px 40px rgba(255,215,0,0.3);
      max-width: 100%; 
      max-height: 80vh;
    }
    #ui { 
      position: absolute; 
      top: 20px; 
      left: 20px; 
      z-index: 10; 
      font-size: 24px; 
      font-weight: bold; 
      text-shadow: 2px 2px 4px #000;
      color: #ffd700;
    }
    #controls { 
      position: absolute; 
      bottom: 20px; 
      left: 20px; 
      right: 20px; 
      z-index: 10; 
      background: rgba(0,0,0,0.7); 
      border: 2px solid #ffd700; 
      border-radius: 12px; 
      padding: 15px; 
      color: #ffd700; 
      font-size: 18px; 
      font-weight: bold; 
      text-align: center;
      text-shadow: 1px 1px 2px #000;
    }
    #nameInput { 
      position: absolute; 
      bottom: 50px; 
      left: 50%; 
      transform: translateX(-50%); 
      padding: 15px 30px; 
      font-size: 20px; 
      border: 2px solid #ffd700; 
      border-radius: 25px; 
      background: #333; 
      color: #ffd700; 
      font-weight: bold; 
      text-align: center;
      display: none;
    }
    .btn { 
      padding: 20px 50px; 
      font-size: 24px; 
      background: linear-gradient(45deg, #ffd700, #ffed4a); 
      color: #1a1a1a; 
      border: none; 
      border-radius: 50px; 
      cursor: pointer; 
      font-weight: bold; 
      box-shadow: 0 10px 20px rgba(255,215,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      margin: 10px;
      display: none;
    }
    .btn:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(255,215,0,0.2); }
    #leaderboard { 
      position: absolute; 
      top: 20px; 
      right: 20px; 
      background: rgba(26,26,26,0.95); 
      border: 2px solid #ffd700;
      padding: 20px; 
      border-radius: 12px; 
      color: #ffd700; 
      font-size: 16px; 
      max-width: 220px;
    }
    h1 { 
      font-size: 36px; 
      margin-bottom: 20px; 
      text-shadow: 3px 3px 6px #000;
    }
    .heineken { color: #00b712; font-size: 1.2em; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🥂 CHEERS EDITION</h1>
  <p class="heineken">Heineken Caneca Run!</p>
  <canvas id="gameCanvas" width="800" height="400"></canvas>
  <div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Nome: <span id="playerName">Anónimo</span></div>
  </div>
  <div id="controls"></div>
  <input type="text" id="nameInput" maxlength="12" placeholder="O teu nome">
  <button id="startBtn" class="btn">JOGAR!</button>
  <button id="restartBtn" class="btn">JOGAR OUTRA VEZ</button>
  <div id="leaderboard"></div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const playerNameEl = document.getElementById('playerName');
    const nameInput = document.getElementById('nameInput');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const leaderboardEl = document.getElementById('leaderboard');
    const controlsEl = document.getElementById('controls');

    // Detectar PC vs Mobile
    const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    // Controls legend
    controlsEl.innerHTML = isMobile ? 
      '👆 Toque: Salto<br>← Swipe Esquerda<br>→ Swipe Direita' : 
      '← → Setas: Mover<br>SPACE: Saltar';

    // Game state
    let gameState = 'menu';
    let score = 0;
    let playerName = 'Anónimo';
    let keys = {};
    let highScores = JSON.parse(localStorage.getItem('cheersHeinekenHighScores')) || [];
    let cameraX = 0;
    let worldX = 0;

    // Player
    const player = {
      x: 100,
      y: 250,
      width: 40,
      height: 50,
      vx: 0,
      vy: 0,
      onGround: false,
      frame: 0
    };

    const groundY = 340;
    const platforms = [
      {x: -2000, y: groundY, width: 4000, height: 60},
      {x: 200, y: 270, width: 150, height: 20},
      {x: 450, y: 210, width: 120, height: 20},
      {x: 700, y: 290, width: 180, height: 20},
      {x: 950, y: 240, width: 160, height: 20},
      {x: 1200, y: 170, width: 200, height: 20},
      {x: 1500, y: 270, width: 140, height: 20}
    ];

    let canecas = [];
    let enemies = [];

    function spawnCaneca() {
      canecas.push({
        x: worldX + canvas.width + Math.random() * 400 + 200,
        y: groundY - 60 - Math.random() * 80,
        width: 28,
        height: 35,
        collected: false,
        bob: 0
      });
    }

    function spawnEnemy() {
      enemies.push({
        x: worldX + canvas.width + Math.random() * 600,
        y: groundY - 30,
        width: 32,
        height: 32,
        vx: -2
      });
    }

    // Input PC/Mobile
    window.addEventListener('keydown', (e) => { 
      keys[e.code] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        if (player.onGround) player.vy = -14;
      }
    });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    // Touch mobile
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });
    canvas.addEventListener('touchmove', (e) => e.preventDefault());
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) * 1.5) {
        if (dx > 40) keys['ArrowRight'] = true;
        else if (dx < -40) keys['ArrowLeft'] = true;
      } else if (dy > 30 && player.onGround) {
        player.vy = -14;
      }
      setTimeout(() => { 
        keys['ArrowLeft'] = keys['ArrowRight'] = false; 
      }, 200);
    });

    // Update player
    function updatePlayer(dt) {
      // Horizontal - setas confirmadas
      if (keys['ArrowRight'] || keys['KeyD']) {
        player.vx = Math.min(player.vx + 15 * dt, 4);
      } else if (keys['ArrowLeft'] || keys['KeyA']) {
        player.vx = Math.max(player.vx - 15 * dt, -4);
      } else {
        player.vx *= 0.88;
      }

      player.vy += 20 * dt;
      player.y += player.vy;
      player.x += player.vx;

      if (player.x < 50) player.x = 50;
      if (player.x > worldX + canvas.width - 100) player.x = worldX + canvas.width - 100;

      // Collision
      player.onGround = false;
      if (player.y + player.height > groundY) {
        player.y = groundY - player.height;
        player.vy = 0;
        player.onGround = true;
      }
      for (let plat of platforms) {
        if (player.x < plat.x + plat.width &&
            player.x + player.width > plat.x &&
            player.y + player.height < plat.y + plat.height &&
            player.y + player.height + player.vy >= plat.y &&
            player.vy > 0) {
          player.y = plat.y - player.height;
          player.vy = 0;
          player.onGround = true;
        }
      }

      if (player.y > canvas.height + 50) gameOver();

      player.frame += Math.abs(player.vx) * 0.1;
    }

    // Update world
    function updateWorld(dt) {
      worldX += 1.8;
      score += 12;

      const targetCamera = player.x - canvas.width / 3;
      cameraX += (targetCamera - cameraX) * 0.12;

      // Canecas
      for (let i = canecas.length - 1; i >= 0; i--) {
        let c = canecas[i];
        c.bob += dt * 3;
        c.y += Math.sin(c.bob) * 0.8;
        if (Math.hypot(c.x - player.x, c.y - player.y) < 40 && !c.collected) {
          c.collected = true;
          score += 500;
        }
        if (c.x < cameraX - 150) canecas.splice(i, 1);
      }
      if (Math.random() < 0.02) spawnCaneca();

      // Enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.x -= 2.2;
        if (Math.hypot(e.x - player.x, e.y - player.y) < 45) {
          gameOver();
          return;
        }
        if (e.x < cameraX - 150) enemies.splice(i, 1);
      }
      if (Math.random() < 0.01) spawnEnemy();
    }

    // Render VISÍVEL
    function render() {
      // Background visível
      const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      skyGrad.addColorStop(0, '#444');
      skyGrad.addColorStop(0.5, '#777');
      skyGrad.addColorStop(1, '#222');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Ground VISÍVEL sempre
      ctx.fillStyle = '#8B4513'; // castanho visível
      ctx.fillRect(-100 - cameraX, groundY, 1000, 60);
      ctx.fillStyle = '#DAA520'; // dourado
      for (let x = 0; x < canvas.width; x += 40) {
        ctx.fillRect(x, groundY + 5, 35, 10);
      }

      // Platforms visíveis
      ctx.fillStyle = '#666';
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 4;
      for (let plat of platforms) {
        const screenX = plat.x - cameraX;
        if (screenX > -200 && screenX < canvas.width + 200) {
          ctx.fillRect(screenX, plat.y, plat.width, plat.height);
          ctx.strokeRect(screenX, plat.y, plat.width, plat.height);
        }
      }

      // Canecas douradas
      ctx.fillStyle = '#ffd700';
      for (let c of canecas) {
        if (!c.collected) {
          const screenX = c.x - cameraX;
          if (screenX > -50 && screenX < canvas.width + 50) {
            ctx.save();
            ctx.translate(screenX + 14, c.y + 17);
            ctx.fillRect(-12, -17, 24, 34);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-10, -25, 20, 10); // espuma
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🍺', 0, 8);
            ctx.restore();
          }
        }
      }

      // Enemies
      ctx.fillStyle = '#8B4513';
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 8;
      for (let e of enemies) {
        const screenX = e.x - cameraX;
        if (screenX > -50 && screenX < canvas.width + 50) {
          ctx.fillRect(screenX, e.y, e.width, e.height);
        }
      }
      ctx.shadowBlur = 0;

      // Player dourado BRILHANTE
      const playerScreenX = player.x - cameraX;
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(playerScreenX, player.y, player.width, player.height);
      ctx.shadowBlur = 0;
      // Olhos
      ctx.fillStyle = '#fff';
      ctx.fillRect(playerScreenX + 10, player.y + 10, 6, 6);
      ctx.fillRect(playerScreenX + 24, player.y + 10, 6, 6);
      ctx.fillStyle = '#000';
      ctx.fillRect(playerScreenX + 12, player.y + 12, 2, 2);
      ctx.fillRect(playerScreenX + 26, player.y + 12, 2, 2);

      // Logo visível
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 28px Arial';
      ctx.textAlign = 'right';
      ctx.fillText('CHEERS BAR', canvas.width - 20, canvas.height - 60);
      ctx.font = 'bold 22px Arial';
      ctx.fillStyle = '#00b712';
      ctx.fillText('HEINEKEN', canvas.width - 20, canvas.height - 30);
      ctx.textAlign = 'left';
    }

    // Game loop
    let lastTime = 0;
    function gameLoop(time) {
      const dt = Math.min((time - lastTime) / 1000, 0.016);
      lastTime = time;

      if (gameState === 'playing') {
        updatePlayer(dt);
        updateWorld(dt);
        scoreEl.textContent = Math.floor(score);
      }
      render();
      requestAnimationFrame(gameLoop);
    }

    function gameOver() {
      gameState = 'nameEntry';
      nameInput.style.display = 'block';
      nameInput.focus();
      restartBtn.style.display = 'block';
    }

    function saveScore() {
      playerName = nameInput.value.trim() || 'Anónimo';
      playerNameEl.textContent = playerName;
      const entry = { name: playerName, score: Math.floor(score) };
      highScores.push(entry);
      highScores.sort((a, b) => b.score - a.score);
      highScores = highScores.slice(0, 10);
      localStorage.setItem('cheersHeinekenHighScores', JSON.stringify(highScores));
      showLeaderboard();
      nameInput.style.display = 'none';
      gameState = 'gameOver';
    }

    function showLeaderboard() {
      leaderboardEl.innerHTML = '<strong>🏆 TOP 10</strong><br>';
      highScores.slice(0,10).forEach((hs, i) => {
        leaderboardEl.innerHTML += `${i+1}. ${hs.name.padEnd(8)} ${hs.score.toLocaleString()}<br>`;
      });
    }

    function resetGame() {
      score = 0;
      worldX = 0;
      cameraX = 0;
      player.x = 100;
      player.y = 250;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      canecas = [];
      enemies = [];
      gameState = 'playing';
      for (let i = 0; i < 6; i++) spawnCaneca();
      restartBtn.style.display = 'none';
    }

    startBtn.onclick = () => {
      resetGame();
      startBtn.style.display = 'none';
    };

    restartBtn.onclick = resetGame;

    nameInput.onkeypress = (e) => { if (e.key === 'Enter') saveScore(); };
    nameInput.onblur = saveScore;

    showLeaderboard();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
