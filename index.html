<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHEERS EDITION - Heineken Mario</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, sans-serif; 
      background: linear-gradient(135deg, #0288d1 0%, #00b0ff 50%, #4fc3f7 100%);
      color: #fff; 
      min-height: 100vh; 
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    canvas { 
      border: 4px solid #fff; 
      border-radius: 12px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      background: #87ceeb; 
      max-width: 100%; 
      max-height: 80vh;
    }
    #ui { 
      position: absolute; 
      top: 20px; 
      left: 20px; 
      z-index: 10; 
      font-size: 24px; 
      font-weight: bold; 
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    #nameInput { 
      position: absolute; 
      bottom: 50px; 
      left: 50%; 
      transform: translateX(-50%); 
      padding: 15px 30px; 
      font-size: 20px; 
      border: none; 
      border-radius: 25px; 
      background: #fff; 
      color: #0288d1; 
      font-weight: bold; 
      text-align: center;
      display: none;
    }
    #startBtn { 
      padding: 20px 50px; 
      font-size: 28px; 
      background: #00c853; 
      color: white; 
      border: none; 
      border-radius: 50px; 
      cursor: pointer; 
      font-weight: bold; 
      box-shadow: 0 10px 20px rgba(0,200,83,0.4);
      transition: transform 0.2s;
    }
    #startBtn:active { transform: scale(0.95); }
    #leaderboard { 
      position: absolute; 
      top: 20px; 
      right: 20px; 
      background: rgba(255,255,255,0.9); 
      padding: 20px; 
      border-radius: 12px; 
      color: #0288d1; 
      font-size: 16px; 
      max-width: 200px;
      display: none;
    }
    h1 { 
      font-size: 36px; 
      margin-bottom: 20px; 
      text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
    }
    .heineken { color: #00b712; font-size: 1.2em; }
  </style>
</head>
<body>
  <h1>🧑‍🍳 CHEERS EDITION</h1>
  <p class="heineken">Heineken Super Mario Run!</p>
  <canvas id="gameCanvas" width="800" height="400"></canvas>
  <div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Player: <span id="playerName">Anónimo</span></div>
  </div>
  <input type="text" id="nameInput" maxlength="12" placeholder="Nome Jogador">
  <button id="startBtn">JOGAR!</button>
  <div id="leaderboard"></div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const playerNameEl = document.getElementById('playerName');
    const nameInput = document.getElementById('nameInput');
    const startBtn = document.getElementById('startBtn');
    const leaderboardEl = document.getElementById('leaderboard');

    // Game state
    let gameState = 'menu'; // menu, playing, gameOver, nameEntry
    let score = 0;
    let playerName = 'Anónimo';
    let keys = {};
    let highScores = JSON.parse(localStorage.getItem('cheersHeinekenHighScores')) || [];
    let gameSpeed = 3;
    let scrollX = 0;

    // Player
    const player = {
      x: 100,
      y: 300,
      width: 40,
      height: 50,
      vx: 0,
      vy: 0,
      onGround: false,
      frame: 0
    };

    // Platforms (simple level)
    const platforms = [
      {x: 0, y: 350, width: 2000, height: 50},
      {x: 300, y: 280, width: 150, height: 20},
      {x: 550, y: 220, width: 100, height: 20},
      {x: 800, y: 300, width: 200, height: 20},
      {x: 1200, y: 250, width: 150, height: 20},
      {x: 1600, y: 180, width: 200, height: 20}
    ];

    // Heineken bottles (coins)
    let bottles = [];
    function addBottle() {
      bottles.push({
        x: scrollX + canvas.width + Math.random() * 300,
        y: 200 + Math.random() * 100,
        width: 25,
        height: 30,
        collected: false
      });
    }

    // Enemies (simple goombas)
    let enemies = [];
    function addEnemy() {
      enemies.push({
        x: scrollX + canvas.width + Math.random() * 500,
        y: 320,
        width: 30,
        height: 30,
        vx: -1 - gameSpeed * 0.5
      });
    }

    // Input
    window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

    // Touch controls
    let touchStartX = 0;
    canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    });
    canvas.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      if (touchEndX - touchStartX > 50) {
        keys['right'] = true;
      } else if (touchStartX - touchEndX > 50) {
        keys['left'] = true;
      } else {
        player.vy = -12;
      }
      setTimeout(() => { keys['left'] = keys['right'] = false; }, 100);
    });

    // Update player
    function updatePlayer() {
      // Horizontal
      if (keys['right'] || keys['d']) {
        player.vx = Math.min(player.vx + 0.5, 5);
      } else if (keys['left'] || keys['a']) {
        player.vx = Math.max(player.vx - 0.5, -5);
      } else {
        player.vx *= 0.85;
      }

      // Jump
      if ((keys[' '] || keys['w'] || keys['up']) && player.onGround) {
        player.vy = -12;
        player.onGround = false;
      }

      // Gravity
      player.vy += 0.8;
      player.y += player.vy;
      player.x += player.vx;

      // Boundaries
      if (player.x < 50) player.x = 50;
      if (player.y > canvas.height) {
        gameOver();
        return;
      }

      // Platform collision
      player.onGround = false;
      for (let plat of platforms) {
        if (player.x < plat.x + plat.width &&
            player.x + player.width > plat.x &&
            player.y + player.height <= plat.y + plat.height &&
            player.y + player.height + player.vy >= plat.y) {
          if (player.vy > 0) {
            player.y = plat.y - player.height;
            player.vy = 0;
            player.onGround = true;
          }
        }
      }

      // Animation frame
      if (player.vx > 0.1 || player.vx < -0.1) player.frame += 0.2;
    }

    // Update world
    function updateWorld() {
      scrollX -= gameSpeed;
      score += 1;
      gameSpeed += 0.001;

      // Remove old platforms? Endless repeat simple
      platforms[0].x += canvas.width * 0.0005; // slow move

      // Bottles
      for (let i = bottles.length - 1; i >= 0; i--) {
        let b = bottles[i];
        b.x -= gameSpeed;
        if (Math.abs(b.x - player.x) < 30 && Math.abs(b.y - player.y) < 40 && !b.collected) {
          b.collected = true;
          score += 100;
        }
        if (b.x < scrollX - 100) bottles.splice(i, 1);
      }
      if (Math.random() < 0.02) addBottle();

      // Enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.x += e.vx;
        if (Math.abs(e.x - player.x) < 40 && Math.abs(e.y - player.y) < 50) {
          gameOver();
          return;
        }
        if (e.x < scrollX - 100) enemies.splice(i, 1);
      }
      if (Math.random() < 0.01) addEnemy();
    }

    // Render
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Background Heineken green hills
      ctx.fillStyle = '#90EE90';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#228B22';
      for (let i = 0; i < canvas.width; i += 100) {
        ctx.beginPath();
        ctx.arc(i + scrollX * 0.1, 350, 50, 0, Math.PI);
        ctx.fill();
      }

      // Platforms
      ctx.fillStyle = '#8B4513';
      for (let plat of platforms) {
        ctx.fillRect(plat.x - scrollX, plat.y, plat.width, plat.height);
      }

      // Bottles (Heineken green)
      ctx.fillStyle = '#00ff00';
      for (let b of bottles) {
        if (!b.collected) {
          ctx.fillRect(b.x - scrollX, b.y, b.width, b.height);
          ctx.fillStyle = '#fff';
          ctx.fillRect(b.x + 5 - scrollX, b.y + 5, 15, 20); // label
          ctx.fillStyle = '#00ff00';
        }
      }

      // Enemies (brown goombas)
      ctx.fillStyle = '#654321';
      for (let e of enemies) {
        ctx.fillRect(e.x - scrollX, e.y, e.width, e.height);
      }

      // Player (Mario-like with Heineken hat)
      ctx.fillStyle = player.onGround ? '#ff0000' : '#ff4444';
      ctx.fillRect(player.x, player.y, player.width, player.height);
      ctx.fillStyle = '#00b712'; // Heineken green pants
      ctx.fillRect(player.x + 5, player.y + 30, 30, 20);
      ctx.fillStyle = '#fff'; // eyes
      ctx.fillRect(player.x + 10, player.y + 10, 4, 4);
      ctx.fillRect(player.x + 25, player.y + 10, 4, 4);

      // Cheers logo
      ctx.fillStyle = '#fff';
      ctx.font = '20px Arial';
      ctx.fillText('CHEERS BAR', canvas.width - 150, 30);
      ctx.fillStyle = '#00b712';
      ctx.fillText('HEINEKEN', canvas.width - 150, 55);
    }

    // Game loop
    function gameLoop() {
      if (gameState === 'playing') {
        updatePlayer();
        updateWorld();
        scoreEl.textContent = Math.floor(score);
      }
      render();
      requestAnimationFrame(gameLoop);
    }

    // Game over
    function gameOver() {
      gameState = 'nameEntry';
      nameInput.style.display = 'block';
      nameInput.focus();
    }

    // Save score
    function saveScore() {
      playerName = nameInput.value || 'Anónimo';
      playerNameEl.textContent = playerName;
      const entry = { name: playerName, score: Math.floor(score) };
      highScores.push(entry);
      highScores.sort((a, b) => b.score - a.score);
      highScores = highScores.slice(0, 10);
      localStorage.setItem('cheersHeinekenHighScores', JSON.stringify(highScores));
      showLeaderboard();
      nameInput.style.display = 'none';
      gameState = 'gameOver';
    }

    // Show leaderboard
    function showLeaderboard() {
      leaderboardEl.innerHTML = '<strong>Top 10 Cheers!</strong><br>';
      highScores.forEach((hs, i) => {
        leaderboardEl.innerHTML += `${i+1}. ${hs.name}: ${Math.floor(hs.score)}<br>`;
      });
      leaderboardEl.style.display = 'block';
    }

    // Events
    startBtn.onclick = () => {
      gameState = 'playing';
      score = 0;
      gameSpeed = 3;
      scrollX = 0;
      player.x = 100;
      player.y = 300;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      bottles = [];
      enemies = [];
      startBtn.style.display = 'none';
      leaderboardEl.style.display = 'none';
      showLeaderboard();
    };

    nameInput.onkeypress = (e) => {
      if (e.key === 'Enter') saveScore();
    };

    nameInput.onblur = saveScore;

    // Init
    showLeaderboard();
    gameLoop();
  </script>
</body>
</html>
