<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHEERS MENU</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>🍻 CHEERS</h1>
  <p>Scan → Escolhe → Bebe 😎</p>
</header>

<main id="menu">

  <section>
    <h2>🔥 Best Sellers</h2>
    <div class="item">
      <img src="images/fino.jpg">
      <div>
        <h3>Fino</h3>
        <button onclick="upsell('nachos')">+ Add Nachos</button>
      </div>
    </div>

    <div class="item">
      <img src="images/heineken.jpg">
      <div>
        <h3>Heineken</h3>
        <button onclick="upsell('double')">Upgrade to Double</button>
      </div>
    </div>
  </section>

  <section>
    <h2>🍺 Bebidas</h2>
    <div class="item"><h3>Fino</h3></div>
    <div class="item"><h3>Sagres</h3></div>
    <div class="item"><h3>Somersby</h3></div>
  </section>

  <section>
    <h2>🍴 Comidas</h2>
    <div class="item"><h3>Tosta Mista</h3></div>
    <div class="item"><h3>Batatas</h3></div>
  </section>

</main>

<nav class="bottom-nav">
  <button>Bebidas</button>
  <button>Comidas</button>
  <button>Conta</button>
</nav>

<script src="app.js"></script>
</body>
</html>
